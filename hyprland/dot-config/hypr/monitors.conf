env = GDK_SCALE,1

# Laptop
monitor=eDP-1,preferred,auto,1

# Docked
monitor=eDP-1,disable
monitor=DVI-I-2,1920x1080@144,0x0,1
monitor=DVI-I-1,1920x1080@60,1920x-384,1,transform,3

workspace=1,monitor:DVI-I-2,default:true,persistent:true
workspace=2,monitor:DVI-I-2,persistent:true
workspace=3,monitor:DVI-I-2,persistent:true
workspace=4,monitor:DVI-I-2,persistent:true
workspace=5,monitor:DVI-I-2,persistent:true
workspace=6,monitor:DVI-I-2,persistent:true
workspace=7,monitor:DVI-I-2,persistent:true

workspace=8,monitor:DVI-I-1,default:true,persistent:true,force:true
workspace=9,monitor:DVI-I-1,persistent:true,force:true
workspace=10,monitor:DVI-I-1,persistent:true,force:true
